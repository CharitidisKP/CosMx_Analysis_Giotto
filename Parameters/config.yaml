# ==============================================================================
# CosMx pipeline configuration
# Relative paths are resolved from the location of this file.
# Block order tracks pipeline-step order. Comments describe parameters only.
# ==============================================================================


# === Globals (cross-step) ===

paths:
  project_dir: "../.."
  scripts_dir: ".."
  raw_data_dir: "../../Data/Raw_data"
  output_dir: "../../Output"
  sample_sheet: "sample_sheet.csv"
  python_path: null

pipeline:
  mode: "separate"             # "separate", "merged", or "all"
  save_intermediates: true
  overwrite_existing: false
  skip_on_error: false
  memory_cleanup: true

reproducibility:
  seed: 42                     # global seed for UMAP, t-SNE, Leiden, InSituType

paired:
  pair_column: "pair_id"
  group_column: "group_id"
  treatment_column: "treatment"
  patient_column: "patient_id"

# Cross-step merged-mode globals (Merge_Batch_Correction.R + step 13).
merged:
  input_step: "07_annotate"
  join_method: "shift"
  x_padding: 5000              # micron offset between samples on shifted joins
  default_treatments: ["CART", "Conventional"]   # Control excluded, n=1 has no estimable variance
  renormalize: true            # re-run normalizeGiotto on merged raw counts
  normalization_scalefactor: null   # null = median library size, integer = fixed
  normalization_log_transform: true
  batch_column: "sample_id"    # Harmony batch column
  n_hvgs: 500
  n_pcs: 30
  dimensions_to_use: "1:30"
  umap_n_neighbors: 30
  umap_min_dist: 0.3
  k_nn: 15
  resolution: 0.3
  auto_prepare_samples: true
  cohort_column: "leiden_clust"
  run_label: null

  # Notebook-only WTx-guide flow (Paired_Merged_Analysis.Rmd).
  wtx:
    n_hvgs: 4000
    n_pcs: 40
    pca_scale_max: 10
    pca_do_scale: true
    pca_do_center: true
    pca_ncores: 5
    knn_k: 15
    knn_metric: cosine
    umap_min_dist: 0.02
    umap_spread: 2
    leiden_resolution: 0.5
    leiden_n_iterations: 2
    harmony_batch_column: sample_id


# === Step 01: Load + FOV split ===
# Composite slides (multiple biopsies on one raw slide) are subset by FOV at load time.
fov_split:
  enabled: true
  fov_column: "fov"            # CosMx metadata column with the FOV number
  fov_min_col: "fov_min"       # sample_sheet column, lower FOV bound
  fov_max_col: "fov_max"       # sample_sheet column, upper FOV bound


# === Steps 02-08, 09 (spatial network), 11 (B-cell subclustering) ===
# Children ordered by pipeline step for readability.
parameters:

  # Step 02: QC
  qc:
    gene_min_cells: 10
    cell_min_genes: 50
    cell_max_genes: 5000
    min_count: 100
    max_mito_pct: null
    apply_wtx_outlier: true       # +/- N SD log10 outlier on cells passing the floor
    wtx_sd_threshold: 2.5
    apply_split_ratio: true       # SplitRatioToLocal border filter, no-op if no Area column
    split_ratio_threshold: 0.5
    negprb_ratio_threshold: null  # null = compute and plot only, no flag
    apply_gene_filter: true       # notebook-only, set false to align with WTx guide

  # Step 03: Normalization
  normalization:
    scalefactor: 6000          # integer = fixed, null = per-sample median library size
    log_transform: true

  # Step 04: Dimensionality Reduction
  dim_reduction:
    n_hvgs: 500                # integer, or null for auto: min(500, max(100, round(0.1 * n_genes)))
    n_pcs: 30
    umap_n_neighbors: 30
    umap_min_dist: 0.3
    spatial_hvg: false

  # Step 05: Clustering
  clustering:
    k_nn: 15                   # kNN graph degree
    resolution: 0.8            # Leiden resolution
    n_iterations: 200
    resolution_sweep: [0.3, 0.5, 0.8, 1.0, 1.5]
    dimensions_to_use: "1:30"

  # Step 06: Differential expression markers
  markers:
    cluster_column: "leiden_clust"
    top_n: 25

  # Step 07: Annotation (InSituType supervised + optional refinement + unsupervised pass)
  annotation:
    profiles:
      - name: "HCA_Kidney"
        type: "hca"
        species: "Human"
        age_group: "Adult"
        matrixname: "Kidney_HCA"

      - name: "CosMx_1K_Kidney"
        type: "url"
        source: "https://raw.githubusercontent.com/Nanostring-Biostats/CosMx-Cell-Profiles/main/Human/Kidney_1k/Kidney_1k.profiles.csv"

      - name: "CosMx_6K_Kidney_RCC"
        type: "url"
        source: "https://raw.githubusercontent.com/Nanostring-Biostats/CosMx-Cell-Profiles/main/Human/KidneyRCC_6k/KidneyRCC_6k.profiles.csv"

    default_profile: "HCA_Kidney"
    align_genes: true
    n_starts: 10
    n_clusts_semi: 5
    cohort_column: "leiden_clust"
    min_gene_overlap: 100
    create_plots: true
    refinement: true              # post-hoc refineClusters() on low-confidence cells
    conf_threshold: 0.8
    unsupervised_n_clusts: 16     # integer, "auto", or 0 to skip the unsupervised pass
    unsupervised_auto_range: [12, 18]    # n_clusts range tested when "auto"
    profile_strategy: "default"   # "default", "all", or "best_select"
    score_weights:                # composite score for "best_select" auto-pick
      confidence: 0.35
      high_conf_fraction: 0.25
      composition: 0.30
      coverage: 0.10

  # Step 08: Visualization
  visualization:
    celltype_columns: null
    cluster_column: "leiden_clust"
    marker_genes:                # genes missing from the active panel are silently skipped
      b_cells:           ["CD19", "MS4A1", "CD79A", "CD79B", "IGHM", "IGHG1"]
      b_cell_subtypes:   ["IGHD", "CD27", "AICDA", "BCL6", "PRDM1", "IRF4", "TBX21", "ITGAX", "MKI67"]
      t_cells:           ["CD3D", "CD3E", "CD4", "CD8A", "CD8B"]
      t_cell_subtypes:   ["CXCR5", "PDCD1", "FOXP3", "IL21", "IFNG", "TBX21"]
      myeloid:           ["CD14", "CD68", "LYZ", "CSF1R"]
      nk_cells:          ["NCAM1", "KLRF1", "GNLY", "NKG7"]
      kidney:            ["NPHS1", "NPHS2", "PODXL", "SLC12A1", "UMOD", "CDH1", "KRT8"]
      tls_markers:       ["CXCL13", "CCL19", "CCL21", "CR2", "FDCSP"]
      complement_fc:     ["C1QA", "C1QB", "C3", "C4A", "FCGR1A", "FCGR2A", "FCGR3A"]
      lupus_relevant:    ["BAFF", "TNFSF13", "TNFRSF13B", "TNFRSF13C", "ISG15", "IFI44", "MX1"]
      t_cell_activation: ["CD69", "CD25", "IFNG", "GZMB", "PRF1", "TNF"]
      t_cell_exhaustion: ["PDCD1", "LAG3", "HAVCR2", "TIGIT", "TOX", "CTLA4"]
      proliferation:     ["MKI67", "TOP2A"]
      tumour_markers:    []
    max_cells_preview: 50000
    preview_seed: 1

  # Step 09: Spatial network construction (Delaunay)
  spatial_network:
    max_delaunay_distance: 50  # microns, caps Delaunay edge length

  # Step 11: B-cell subclustering
  bcell_subclustering:
    enabled: true
    min_cells: 50              # warn below this, still runs
    fallback_min_cells: 20     # hard floor, skip subclustering below this
    n_hvgs: 250
    n_pcs: 20
    umap_n_neighbors: 15
    umap_min_dist: 0.3
    k_nn: 10
    resolution: 0.4            # target 3-6 subtypes
    resolution_sweep: [0.2, 0.4, 0.6, 0.8]


# === Step 09: BANKSY niches ===
# Singhal et al. Nat Genet 2024. Invoked from inside step 09_spatial.
banksy:
  enabled: true
  k_geom: 18                   # spatial neighborhood size for BANKSY augmentation
  lambda: 0.2                  # spatial weight (0=no spatial, 1=spatial only)
  resolution: 0.4              # Leiden resolution on BANKSY+Harmony embedding


# === Step 10: Cell-Cell Interaction ===
# InSituCor, LIANA, NicheNet, MISTy, nnSVG.
cci:
  run_sections:
    insitucor: true
    liana: true
    nichenet: true
    misty: true
    nnsvg: true
  nichenet_mode: "single"
  sender_celltypes: null
  receiver_celltype: "B cell"
  target_genes: null
  target_genes_by_receiver:                  # bypasses .resolve_nichenet_targets_auto() while step 12 smiDE is being repaired
    "B cell":
      - IGKC
      - IGHD
      - IGHM
      - IGHA1
      - JCHAIN
      - CD19
      - CD79A
      - CD79B
      - MS4A1
      - CXCR5
  nichenet_network_dir: null
  nichenet_spatial_filter: false      # false, true, or "both"
  nichenet_proximity_enrichment_path: null
  nichenet_spatial_padj_threshold: 0.05
  nichenet_min_cells_per_celltype: 5
  nichenet_include_self_pairs: false
  cleanup_between_sections: true
  misty_n_target_hvgs: 100            # MISTy global run, top-N HVGs scored as targets
  nnsvg_raster_resolution: auto       # SEraster pixel side, "auto" or numeric um (0=disable)


# === Step 11: Cell-type interaction (B-cell focus) ===
interaction:
  annotation_column: "celltype_HCA_Kidney_supervised"
  save_per_focus_native: false        # per-focus native Giotto saves under 11_<focus>_Microenvironment/
  focus_celltype_regex: '^(B cell|Naive B cell|Memory B cell|Plasma cell|Plasmablast)$'   # legacy single-focus path
  bcell_regex: '^(B cell|Naive B cell|Memory B cell|Plasma cell|Plasmablast)$'             # B-cell subclustering regex
  focus_analyses:                     # multi-focus iteration, each writes 11_<label>_Microenvironment/
    - label: "BCell"
      regex: '^(B cell|Naive B cell|Memory B cell|Plasma cell|Plasmablast)$'
      run_subclustering: true
    - label: "TCell"
      regex: '^(CD4 T cell|CD8 T cell|Treg|T cell)$'
      run_subclustering: false
  spatial_network_name: "Delaunay_network"
  number_of_simulations: 250
  max_network_edges: 70               # cap on edges drawn in the focused proximity network


# === Step 12: Spatial Differential Expression (smiDE) ===
spatial_de:
  annotation_column: "celltype_HCA_Kidney_supervised"
  leiden_column: "leiden_clust"
  stratify_by: ["celltype", "leiden"]      # one smiDE call per (stratifier x comparison), [] = legacy single-call
  use_pathway_comparisons: true            # mirror pathway.comparisons, set false to use spatial_de.comparisons
  smide_min_cells_per_stratum: 200
  smide_max_strata_per_comparison: 30
  plot_top_n: 30                           # genes labelled in the spatial overlay panel grid
  plot_max_strata_panels: 12               # cap on spatial overlay grid size
  sample_column: "sample_id"
  treatment_column: "treatment"
  patient_column: "patient_id"
  spatial_network_name: "Delaunay_network"
  n_niches: 6
  min_cells_per_niche: 10
  niche_gate_fov_fallback: true            # when a celltype's kmeans niche partition has <2 viable niches, re-assign that celltype's cells to FOV-based niche labels so smiDE has multiple groups
  min_cells_per_sample: 10
  min_samples_per_group: 2
  sample_replicate_column: "fov"
  sample_contrast: "one_vs_rest"
  smide_family: "nbinom2"
  smide_radius: 50                         # microns, cell-cell proximity cutoff
  smide_ncores: 4                          # only consumed by smiDE::smi_de(nCores=)
  smide_inner_workers: 1                   # reserved for the per-cell-type parallel refactor
  smide_overlap_threshold: 0.8             # 1 = disabled, lower = stricter cross-cell contamination filter
  smide_annotation_subset: null            # legacy filter, used only when stratify_by is empty
  smide_min_detection_fraction: 0.01
  smide_custom_predictor: null
  smide_partner_celltypes: null
  smide_partner_source: "none"
  smide_partner_top_n: 5
  smide_partner_padj_threshold: 0.05
  smide_include_self_partner: false
  smide_predictor_mode: "group"            # "count" emits continuous tally per partner (sample-scope only)
  smide_save_raw: true


# === Step 13: Pathway + GSEA ===
# Merged-scope: comparisons span multiple samples.
# Required packages: msigdbr, clusterProfiler, fgsea, enrichplot, ReactomePA,
# org.Hs.eg.db, decoupleR, progeny, presto, pheatmap, UpSetR, ComplexHeatmap.
pathway:
  enabled: true

  # Per-sample pathway analysis (cluster + celltype one-vs-rest GSEA).
  sample_scope:
    enabled: true
    stratifications: ["cluster", "celltype"]

  # Merged paired-GSEA-score sub-step, paired Wilcoxon on per-patient NES deltas.
  paired_gsea_scores:
    enabled: false
    per_sample_dir_template: null          # null = auto from cfg$paths$output_dir

  # 3-backend Spearman sensitivity check, re-runs one comparison through every backend.
  de_sensitivity_check:
    enabled: false
    comparison_label: "CART_before_vs_after"
    stratum: "B cell"
    backends: ["pseudobulk_deseq2", "pseudobulk_edger", "pseudobulk_limma_voom"]
    output: "sensitivity_check.csv"
    spearman_threshold: 0.9

  # Per-comparison optional keys: pseudobulk_backend, block, niche_split.
  comparisons:
    - label: "CART_before_vs_after"
      group_a: { treatment: "CART",         timepoint: "T0" }
      group_b: { treatment: "CART",         timepoint: "T06" }
      design: "paired"
    - label: "Conv_before_vs_after"
      group_a: { treatment: "Conventional", timepoint: "T0" }
      group_b: { treatment: "Conventional", timepoint: "T06" }
      design: "paired"
    - label: "CART_vs_Conv_before"
      group_a: { treatment: "CART",         timepoint: "T0" }
      group_b: { treatment: "Conventional", timepoint: "T0" }
      design: "unpaired"
    - label: "CART_vs_Conv_after"
      group_a: { treatment: "CART",         timepoint: "T06" }
      group_b: { treatment: "Conventional", timepoint: "T06" }
      design: "unpaired"
    - label: "CART_baseline_vs_Control"
      group_a: { treatment: "CART",         timepoint: "T0" }
      group_b: { treatment: "Control" }
      design: "descriptive"
    - label: "CART_after_vs_Control"
      group_a: { treatment: "CART",         timepoint: "T06" }
      group_b: { treatment: "Control" }
      design: "descriptive"

  stratifications: ["celltype", "leiden"]   # use celltype_column and/or leiden_column
  celltype_column: null                     # null = auto-detect celltype_*_supervised
  leiden_column: "leiden_clust"
  focus_celltype: "^B cell$"
  min_cells_per_stratum: 30                 # strata below this are skipped
  min_genes_tested: 50
  de_engine: "pseudobulk_deseq2"            # pseudobulk_deseq2, pseudobulk_edger, pseudobulk_limma_voom, presto_wilcox
  de_min_pseudobulk_per_group: 2            # below this, comparison degrades to descriptive
  species: "Homo sapiens"
  databases:                                # MSigDB collections, each with a group + tests subset
    - { collection: "C5", subcollections: ["GO:BP", "GO:MF", "GO:CC"], group: "main_ora", tests: ["ora"] }
    - { collection: "C2", subcollections: ["CP:KEGG_LEGACY", "CP:REACTOME"], group: "main_ora", tests: ["ora"] }
    - { collection: "H",  subcollections: null, group: "hallmark", tests: ["gsea"] }
    - { collection: "C7", subcollections: null, group: "immune",   tests: ["ora"] }
    - { collection: "C8", subcollections: null, group: "celltype", tests: ["ora"] }
  gsea:
    min_size: 10
    max_size: 500
    nperm_seed: 42
    padj_threshold: 0.05
  ora:
    logfc_threshold: 0.5
    padj_threshold: 0.05
    universe_source: "tested"               # "tested" or "panel"
  leading_edge_top_n: 5                     # cap on per-pathway leading-edge heatmaps, 0 to disable
  progeny:
    enabled: true
    top_n_genes: 500
  pdf_summary: true
